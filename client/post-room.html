<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Room | Chennai Roommate Finder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="bg-gray-50 text-gray-900 min-h-screen">
    <nav class="fixed w-full z-50 bg-white border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <a href="index.html"
                    class="text-2xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">ChennaiRooms</a>
                <div class="flex space-x-6 items-center" id="nav-links"></div>
            </div>
        </div>
    </nav>

    <main class="pt-24 pb-12 max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100">
            <div class="p-8">
                <h1 class="text-3xl font-extrabold text-gray-900 mb-2">Post a Room</h1>
                <p class="text-gray-500 mb-8">Fill in the details to find your next roommate.</p>

                <div id="error-msg"
                    class="hidden mb-6 p-4 bg-red-50 border border-red-100 text-red-600 rounded-xl text-sm"></div>

                <form id="post-room-form" class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">Area / Location
                                (Chennai)</label>
                            <input type="text" id="location" required
                                class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none"
                                placeholder="e.g. T Nagar, OMR, Velachery">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">Monthly Rent (₹)</label>
                            <input type="number" id="rent" required
                                class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none"
                                placeholder="10000">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">Roommates Needed</label>
                            <input type="number" id="roommates_needed" required
                                class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none"
                                placeholder="1">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">Room Type</label>
                            <select id="room_type"
                                class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none">
                                <option value="1BHK">1BHK</option>
                                <option value="2BHK">2BHK</option>
                                <option value="3BHK">3BHK</option>
                                <option value="PG">PG</option>
                                <option value="Individual House">Individual House</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Amenities (Comma
                            separated)</label>
                        <input type="text" id="amenities"
                            class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none"
                            placeholder="WiFi, AC, Parking, Gym">
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Description</label>
                        <textarea id="description" rows="4"
                            class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none"
                            placeholder="Tell us more about the room and your expectations..."></textarea>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Image URL (Optional)</label>
                        <input type="url" id="image_url"
                            class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none"
                            placeholder="https://example.com/room.jpg">
                    </div>

                    <button type="submit"
                        class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-100">Publish
                        Room Post</button>
                </form>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script>
        document.getElementById('post-room-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                location: document.getElementById('location').value,
                rent: document.getElementById('rent').value,
                roommates_needed: document.getElementById('roommates_needed').value,
                room_type: document.getElementById('room_type').value,
                amenities: document.getElementById('amenities').value,
                description: document.getElementById('description').value,
                image_url: document.getElementById('image_url').value
            };
            const errorMsg = document.getElementById('error-msg');

            try {
                await api.rooms.post(data);
                window.location.href = 'rooms.html';
            } catch (err) {
                errorMsg.textContent = err.message;
                errorMsg.classList.remove('hidden');
            }
        });
    </script>
</body>

</html>
