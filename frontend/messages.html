<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages | ChennaiRooms</title>
    <link rel="stylesheet" href="css/glow.css">
    <style>
        .messages-layout {
            padding: 90px 0 40px;
            min-height: 100vh;
        }

        .messages-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.75rem;
        }

        .chat-container {
            display: flex;
            gap: 1.25rem;
            height: calc(100vh - 200px);
            min-height: 520px;
        }

        /* Sidebar */
        .conv-sidebar {
            width: 300px;
            flex-shrink: 0;
            background: rgba(15, 15, 35, 0.85);
            border: 1px solid var(--border);
            border-radius: 1.25rem;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .sidebar-head {
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--border);
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--white);
            background: rgba(124, 58, 237, 0.08);
        }

        .conv-list {
            flex: 1;
            overflow-y: auto;
        }

        .conv-item {
            padding: 1rem 1.25rem;
            cursor: pointer;
            border-left: 3px solid transparent;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            transition: background 0.2s, border-color 0.2s;
        }

        .conv-item:hover {
            background: rgba(124, 58, 237, 0.08);
        }

        .conv-item.active {
            background: rgba(124, 58, 237, 0.14);
            border-left-color: var(--purple-l);
        }

        .conv-name {
            font-weight: 700;
            font-size: 0.875rem;
            color: var(--white);
        }

        .conv-room {
            font-size: 0.75rem;
            color: var(--cyan-l);
            margin-top: 0.2rem;
        }

        .conv-preview {
            font-size: 0.775rem;
            color: var(--text-muted);
            margin-top: 0.2rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .conv-badge {
            background: var(--purple);
            color: #fff;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 0.1rem 0.5rem;
            border-radius: 50px;
        }

        .conv-empty {
            padding: 3rem 1.5rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .conv-empty-icon {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
            opacity: 0.4;
        }

        /* Chat Panel */
        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(15, 15, 35, 0.85);
            border: 1px solid var(--border);
            border-radius: 1.25rem;
            overflow: hidden;
        }

        .chat-placeholder {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            gap: 0.75rem;
        }

        .chat-placeholder-icon {
            font-size: 3rem;
            opacity: 0.3;
        }

        .chat-view {
            display: none;
            flex-direction: column;
            height: 100%;
        }

        .chat-head {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 0.875rem;
            background: rgba(124, 58, 237, 0.07);
        }

        .chat-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--purple), var(--cyan));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 0.9rem;
            color: #fff;
            box-shadow: 0 0 16px rgba(124, 58, 237, 0.5);
        }

        .chat-name {
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--white);
        }

        .chat-room-label {
            font-size: 0.75rem;
            color: var(--cyan-l);
        }

        .chat-thread {
            flex: 1;
            overflow-y: auto;
            padding: 1.25rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            scroll-behavior: smooth;
        }

        .bubble-sent {
            align-self: flex-end;
            max-width: 72%;
            background: linear-gradient(135deg, var(--purple), #6d28d9);
            color: #fff;
            border-radius: 18px 18px 4px 18px;
            padding: 0.65rem 1rem;
            box-shadow: 0 4px 20px rgba(124, 58, 237, 0.4);
        }

        .bubble-recv {
            align-self: flex-start;
            max-width: 72%;
            background: rgba(255, 255, 255, 0.07);
            color: var(--text);
            border-radius: 18px 18px 18px 4px;
            border: 1px solid var(--border);
            padding: 0.65rem 1rem;
        }

        .bubble-text {
            font-size: 0.875rem;
            line-height: 1.5;
        }

        .bubble-time {
            font-size: 0.7rem;
            margin-top: 0.3rem;
            text-align: right;
        }

        .bubble-sent .bubble-time {
            color: rgba(255, 255, 255, 0.6);
        }

        .bubble-recv .bubble-time {
            color: var(--text-muted);
        }

        .chat-input-area {
            padding: 1rem 1.25rem;
            border-top: 1px solid var(--border);
            background: rgba(10, 10, 20, 0.6);
            display: flex;
            gap: 0.75rem;
            align-items: flex-end;
        }

        .chat-input-area textarea {
            flex: 1;
            padding: 0.75rem 1rem;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--border);
            border-radius: 0.875rem;
            color: var(--text);
            font-size: 0.875rem;
            resize: none;
            outline: none;
            max-height: 120px;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .chat-input-area textarea::placeholder {
            color: var(--text-muted);
        }

        .chat-input-area textarea:focus {
            border-color: var(--purple-l);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.2);
        }
    </style>
</head>

<body>
    <nav class="glow-nav">
        <div class="glow-nav-inner">
            <a href="index.html" class="glow-logo">⚡ ChennaiRooms</a>
            <div class="nav-links" id="nav-links"></div>
        </div>
    </nav>

    <div class="messages-layout">
        <div class="content-wrap">
            <div class="messages-header">
                <div>
                    <h1 class="glow-title" style="font-size:1.9rem;">💬 Messages</h1>
                    <p class="glow-subtitle" style="font-size:0.9rem;">Your direct conversations with room owners and
                        seekers.</p>
                </div>
                <a href="rooms.html" class="btn-glow-purple" style="padding:0.6rem 1.2rem;">🏠 Find Rooms</a>
            </div>

            <div class="chat-container">
                <!-- Sidebar -->
                <div class="conv-sidebar">
                    <div class="sidebar-head">📬 Inbox</div>
                    <div class="conv-list" id="conv-list">
                        <div class="conv-empty" id="conv-empty">
                            <div class="conv-empty-icon">💬</div>
                            <p style="font-weight:600;color:var(--text);">No conversations yet</p>
                            <p style="margin-top:0.3rem;">Message a room owner to start.</p>
                        </div>
                    </div>
                </div>

                <!-- Chat Panel -->
                <div class="chat-panel">
                    <div class="chat-placeholder" id="chat-placeholder">
                        <div class="chat-placeholder-icon">🗨️</div>
                        <p style="font-weight:600;color:var(--text);">Select a conversation</p>
                        <p style="font-size:0.85rem;">to read and reply</p>
                    </div>
                    <div class="chat-view" id="chat-view">
                        <div class="chat-head">
                            <div class="chat-avatar" id="chat-avatar">?</div>
                            <div>
                                <div class="chat-name" id="chat-name">—</div>
                                <div class="chat-room-label" id="chat-room">—</div>
                            </div>
                        </div>
                        <div class="chat-thread" id="chat-thread"></div>
                        <div class="chat-input-area">
                            <textarea id="msg-input" rows="2" placeholder="Type your message…"></textarea>
                            <button id="send-btn" onclick="sendReply()" class="btn-glow-purple"
                                style="padding:0.75rem 1.25rem;flex-shrink:0;">✈️ Send</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/messages.js"></script>
    <script src="js/dashboard.js"></script>
    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) { window.location.href = 'login.html'; }

        let activeConvId = null;
        const urlParams = new URLSearchParams(window.location.search);
        const openConvId = urlParams.get('conv');

        async function loadConversations() {
            try {
                const convs = await messages.getConversations();
                const list = document.getElementById('conv-list');
                const empty = document.getElementById('conv-empty');
                if (!convs || convs.length === 0) {
                    empty.style.display = 'block';
                    if (openConvId) {
                        empty.querySelector('p:first-of-type').textContent = 'Conversation not found';
                    }
                    return;
                }
                empty.style.display = 'none';
                list.innerHTML = '';
                convs.forEach(c => {
                    const card = document.createElement('div');
                    card.id = `conv-${c.id}`;
                    card.className = 'conv-item';
                    card.innerHTML = `
                        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.2rem;">
                            <span class="conv-name">${c.other_user_name || 'User'}</span>
                            ${c.unread_count > 0 ? `<span class="conv-badge">${c.unread_count}</span>` : ''}
                        </div>
                        <div class="conv-room">📍 ${c.room_title || 'Room'}</div>
                        <div class="conv-preview">${c.last_message || 'No messages yet'}</div>
                    `;
                    card.onclick = () => openConversation(c);
                    list.appendChild(card);
                });
                if (openConvId) {
                    const target = convs.find(c => c.id == openConvId);
                    if (target) openConversation(target);
                }
            } catch (e) {
                console.error('Failed to load conversations:', e);
                const empty = document.getElementById('conv-empty');
                empty.style.display = 'block';
                empty.innerHTML = `<div class="conv-empty"><div class="conv-empty-icon">⚠️</div><p style="color:#f87171;font-weight:600;">Could not load</p><p>${e.message && e.message.toLowerCase().includes('failed to fetch') ? 'Backend not running on port 5000.' : e.message}</p></div>`;
            }
        }

        async function openConversation(conv) {
            activeConvId = conv.id;
            document.querySelectorAll('.conv-item').forEach(el => el.classList.remove('active'));
            const card = document.getElementById(`conv-${conv.id}`);
            if (card) card.classList.add('active');
            document.getElementById('chat-avatar').textContent = (conv.other_user_name || 'U')[0].toUpperCase();
            document.getElementById('chat-name').textContent = conv.other_user_name || 'User';
            document.getElementById('chat-room').textContent = `📍 ${conv.room_title || 'Room'}`;
            document.getElementById('chat-placeholder').style.display = 'none';
            const cv = document.getElementById('chat-view');
            cv.style.display = 'flex';
            await fetchMessages(conv.id);
            messages.markRead(conv.id).catch(() => { });
        }

        async function fetchMessages(convId) {
            const thread = document.getElementById('chat-thread');
            thread.innerHTML = '<p style="text-align:center;color:var(--text-muted);font-size:0.85rem;">Loading…</p>';
            try {
                const msgs = await messages.getMessagesByConversation(convId);
                thread.innerHTML = '';
                if (!msgs || msgs.length === 0) {
                    thread.innerHTML = '<p style="text-align:center;color:var(--text-muted);font-size:0.85rem;margin-top:2rem;">No messages yet. Say hello! 👋</p>';
                    return;
                }
                msgs.forEach(m => renderBubble(m, thread));
                thread.scrollTop = thread.scrollHeight;
            } catch (e) {
                thread.innerHTML = '<p style="text-align:center;color:#f87171;font-size:0.85rem;">Could not load messages.</p>';
            }
        }

        function renderBubble(m, thread) {
            const isMine = m.sender_id === user.id;
            const wrapper = document.createElement('div');
            wrapper.style.display = 'flex';
            wrapper.style.justifyContent = isMine ? 'flex-end' : 'flex-start';
            const time = new Date(m.created_at).toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
            wrapper.innerHTML = `
                <div class="${isMine ? 'bubble-sent' : 'bubble-recv'}">
                    <div class="bubble-text">${escapeHtml(m.message_text)}</div>
                    <div class="bubble-time">${time}</div>
                </div>
            `;
            thread.appendChild(wrapper);
        }

        async function sendReply() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (!text || !activeConvId) return;
            const btn = document.getElementById('send-btn');
            btn.disabled = true; btn.textContent = 'Sending…';
            try {
                await messages.sendMessage(activeConvId, text);
                input.value = '';
                btn.disabled = false; btn.textContent = '✈️ Send';
                const thread = document.getElementById('chat-thread');
                renderBubble({ sender_id: user.id, message_text: text, created_at: new Date().toISOString() }, thread);
                thread.scrollTop = thread.scrollHeight;
            } catch (e) {
                btn.disabled = false; btn.textContent = '✈️ Send';
                alert('Failed to send: ' + e.message);
            }
        }

        document.getElementById('msg-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendReply(); }
        });

        function escapeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        document.addEventListener('DOMContentLoaded', loadConversations);
    </script>
</body>

</html>
