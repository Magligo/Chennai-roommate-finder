<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages | ChennaiRooms</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .messages-layout {
            padding: 40px 0;
            min-height: calc(100vh - 72px);
            background-color: var(--bg-color);
        }

        .messages-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
        }

        .chat-container {
            display: flex;
            gap: 1.5rem;
            height: calc(100vh - 220px);
            min-height: 500px;
        }

        @media (max-width: 768px) {
            .chat-container {
                flex-direction: column;
                height: auto;
                min-height: unset;
            }
        }

        /* Sidebar */
        .conv-sidebar {
            width: 320px;
            flex-shrink: 0;
            background: var(--paper);
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        @media (max-width: 768px) {
            .conv-sidebar {
                width: 100%;
                height: 300px;
            }
        }

        .sidebar-head {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border-light);
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--text-primary);
            background: #f8fafc;
        }

        .conv-list {
            flex: 1;
            overflow-y: auto;
        }

        .conv-item {
            padding: 1rem 1.5rem;
            cursor: pointer;
            border-left: 3px solid transparent;
            border-bottom: 1px solid var(--border-light);
            transition: background 0.2s, border-color 0.2s;
        }

        .conv-item:hover {
            background: #f8fafc;
        }

        .conv-item.active {
            background: #eff6ff;
            border-left-color: var(--primary);
        }

        .conv-name {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-primary);
        }

        .conv-room {
            font-size: 0.8rem;
            color: var(--secondary);
            margin-top: 0.2rem;
            font-weight: 500;
        }

        .conv-preview {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 0.3rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .conv-badge {
            background: var(--accent);
            color: #fff;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 0.1rem 0.5rem;
            border-radius: 12px;
        }

        .conv-empty {
            padding: 3rem 1.5rem;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* Chat Panel */
        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--paper);
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
        }

        @media (max-width: 768px) {
            .chat-panel {
                height: 500px;
            }
        }

        .chat-placeholder {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            background: #f8fafc;
        }

        .chat-view {
            display: none;
            flex-direction: column;
            height: 100%;
        }

        .chat-head {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            gap: 1rem;
            background: var(--paper);
        }

        .chat-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1rem;
            color: #fff;
        }

        .chat-name {
            font-weight: 700;
            font-size: 1.05rem;
            color: var(--text-primary);
        }

        .chat-room-label {
            font-size: 0.85rem;
            color: var(--secondary);
            font-weight: 500;
        }

        .chat-thread {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            background: var(--bg-color);
        }

        .bubble-sent {
            align-self: flex-end;
            max-width: 75%;
            background: var(--primary);
            color: #fff;
            border-radius: 16px 16px 2px 16px;
            padding: 0.75rem 1rem;
            box-shadow: var(--shadow-sm);
        }

        .bubble-recv {
            align-self: flex-start;
            max-width: 75%;
            background: var(--paper);
            color: var(--text-primary);
            border: 1px solid var(--border-dark);
            border-radius: 16px 16px 16px 2px;
            padding: 0.75rem 1rem;
            box-shadow: var(--shadow-sm);
        }

        .bubble-text {
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .bubble-time {
            font-size: 0.75rem;
            margin-top: 0.4rem;
            text-align: right;
            opacity: 0.7;
        }

        .chat-input-area {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border-light);
            background: var(--paper);
            display: flex;
            gap: 1rem;
            align-items: flex-end;
        }

        .chat-input-area textarea {
            flex: 1;
            padding: 0.75rem 1rem;
            background: #f8fafc;
            border: 1px solid var(--border-dark);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 0.95rem;
            resize: none;
            outline: none;
            max-height: 120px;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .chat-input-area textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M3 9L12 2L21 9V20C21 20.5304 20.7893 21.0391 20.4142 21.4142C20.0391 21.7893 19.5304 22 19 22H5C4.46957 22 3.96086 21.7893 3.58579 21.4142C3.21071 21.0391 3 20.5304 3 20V9Z"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    <path d="M9 22V12H15V22" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
                ChennaiRooms
            </a>
            <div class="nav-links" id="nav-links"></div>
        </div>
    </nav>

    <div class="messages-layout container">
        <div class="messages-header">
            <div class="page-header" style="margin-bottom:0; flex-direction:column; gap:0.25rem;">
                <h1 class="page-title">Messages</h1>
                <p class="page-subtitle">Your direct conversations with room owners and seekers.</p>
            </div>
            <a href="rooms.html" class="btn-primary">Find Rooms</a>
        </div>

        <div class="chat-container">
            <!-- Sidebar -->
            <div class="conv-sidebar">
                <div class="sidebar-head">Inbox</div>
                <div class="conv-list" id="conv-list">
                    <div class="conv-empty" id="conv-empty">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
                            style="opacity:0.3; margin-bottom:1rem;">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                        </svg>
                        <p style="font-weight:600;color:var(--text-primary);margin-bottom:0.25rem;">No conversations yet
                        </p>
                        <p>Message a room owner to start.</p>
                    </div>
                </div>
            </div>

            <!-- Chat Panel -->
            <div class="chat-panel">
                <div class="chat-placeholder" id="chat-placeholder">
                    <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                        stroke-linecap="round" stroke-linejoin="round" style="opacity:0.2; margin-bottom:1rem;">
                        <path
                            d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z">
                        </path>
                    </svg>
                    <p style="font-weight:600;color:var(--text-primary); font-size:1.1rem; margin-bottom:0.25rem;">
                        Select a conversation</p>
                    <p style="font-size:0.95rem;">to read and reply</p>
                </div>
                <div class="chat-view" id="chat-view">
                    <div class="chat-head">
                        <div class="chat-avatar" id="chat-avatar">?</div>
                        <div>
                            <div class="chat-name" id="chat-name">—</div>
                            <div class="chat-room-label" id="chat-room">—</div>
                        </div>
                    </div>
                    <div class="chat-thread" id="chat-thread"></div>
                    <div class="chat-input-area">
                        <textarea id="msg-input" rows="2" placeholder="Type your message…"></textarea>
                        <button id="send-btn" onclick="sendReply()" class="btn-primary" style="flex-shrink:0;">
                            Send
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                                style="margin-left:0.5rem;">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/messages.js"></script>
    <script src="js/dashboard.js"></script>
    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) { window.location.href = 'login.html'; }

        let activeConvId = null;
        const urlParams = new URLSearchParams(window.location.search);
        const openConvId = urlParams.get('conv');

        async function loadConversations() {
            try {
                const convs = await messages.getConversations();
                const list = document.getElementById('conv-list');
                const empty = document.getElementById('conv-empty');
                if (!convs || convs.length === 0) {
                    empty.style.display = 'block';
                    if (openConvId) {
                        empty.querySelector('p:first-of-type').textContent = 'Conversation not found';
                    }
                    return;
                }
                empty.style.display = 'none';
                list.innerHTML = '';
                convs.forEach(c => {
                    const card = document.createElement('div');
                    card.id = `conv-${c.id}`;
                    card.className = 'conv-item';
                    card.innerHTML = `
                        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.25rem;">
                            <span class="conv-name">${c.other_user_name || 'User'}</span>
                            ${c.unread_count > 0 ? `<span class="conv-badge">${c.unread_count}</span>` : ''}
                        </div>
                        <div class="conv-room">📍 ${c.room_title || 'Room'}</div>
                        <div class="conv-preview">${c.last_message || 'No messages yet'}</div>
                    `;
                    card.onclick = () => openConversation(c);
                    list.appendChild(card);
                });
                if (openConvId) {
                    const target = convs.find(c => c.id == openConvId);
                    if (target) openConversation(target);
                }
            } catch (e) {
                console.error('Failed to load conversations:', e);
                const empty = document.getElementById('conv-empty');
                empty.style.display = 'block';
                empty.innerHTML = `<div class="conv-empty" style="color:#ef4444;"><p style="font-weight:600;margin-bottom:0.5rem;">Could not load</p><p>${e.message && e.message.toLowerCase().includes('failed to fetch') ? 'Backend not running on port 5000.' : e.message}</p></div>`;
            }
        }

        async function openConversation(conv) {
            activeConvId = conv.id;
            document.querySelectorAll('.conv-item').forEach(el => el.classList.remove('active'));
            const card = document.getElementById(`conv-${conv.id}`);
            if (card) card.classList.add('active');

            document.getElementById('chat-avatar').textContent = (conv.other_user_name || 'U')[0].toUpperCase();
            document.getElementById('chat-name').textContent = conv.other_user_name || 'User';
            document.getElementById('chat-room').textContent = `📍 ${conv.room_title || 'Room'}`;

            document.getElementById('chat-placeholder').style.display = 'none';
            const cv = document.getElementById('chat-view');
            cv.style.display = 'flex';

            await fetchMessages(conv.id);
            messages.markRead(conv.id).catch(() => { });
        }

        async function fetchMessages(convId) {
            const thread = document.getElementById('chat-thread');
            thread.innerHTML = '<p style="text-align:center;color:var(--text-secondary);font-size:0.9rem;margin-top:2rem;">Loading messages...</p>';
            try {
                const msgs = await messages.getMessagesByConversation(convId);
                thread.innerHTML = '';
                if (!msgs || msgs.length === 0) {
                    thread.innerHTML = '<p style="text-align:center;color:var(--text-secondary);font-size:0.9rem;margin-top:2rem;">No messages yet. Say hello! 👋</p>';
                    return;
                }
                msgs.forEach(m => renderBubble(m, thread));
                thread.scrollTop = thread.scrollHeight;
            } catch (e) {
                thread.innerHTML = '<p style="text-align:center;color:#ef4444;font-size:0.9rem;margin-top:2rem;">Could not load messages.</p>';
            }
        }

        function renderBubble(m, thread) {
            const isMine = m.sender_id === user.id;
            const wrapper = document.createElement('div');
            wrapper.style.display = 'flex';
            wrapper.style.justifyContent = isMine ? 'flex-end' : 'flex-start';
            const time = new Date(m.created_at).toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
            wrapper.innerHTML = `
                <div class="${isMine ? 'bubble-sent' : 'bubble-recv'}">
                    <div class="bubble-text">${escapeHtml(m.message_text)}</div>
                    <div class="bubble-time">${time}</div>
                </div>
            `;
            thread.appendChild(wrapper);
        }

        async function sendReply() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (!text || !activeConvId) return;

            const btn = document.getElementById('send-btn');
            const originalContent = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = 'Sending...';

            try {
                await messages.sendMessage(activeConvId, text);
                input.value = '';
                btn.disabled = false;
                btn.innerHTML = originalContent;

                const thread = document.getElementById('chat-thread');
                // Remove the "no messages yet" if it's the first message
                if (thread.innerHTML.includes('No messages yet')) {
                    thread.innerHTML = '';
                }

                renderBubble({ sender_id: user.id, message_text: text, created_at: new Date().toISOString() }, thread);
                thread.scrollTop = thread.scrollHeight;
            } catch (e) {
                btn.disabled = false;
                btn.innerHTML = originalContent;
                alert('Failed to send: ' + e.message);
            }
        }

        document.getElementById('msg-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendReply(); }
        });

        function escapeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        document.addEventListener('DOMContentLoaded', loadConversations);
    </script>
</body>

</html>
