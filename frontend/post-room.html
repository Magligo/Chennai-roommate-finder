<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Room | ChennaiRooms</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .page-wrap {
            padding: 40px 0 80px;
        }

        .form-card {
            max-width: 640px;
            margin: 0 auto;
            background: var(--paper);
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            padding: 2.5rem;
            box-shadow: var(--shadow-md);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.25rem;
        }

        .full-col {
            grid-column: 1 / -1;
        }

        .error-box {
            display: none;
            padding: 0.85rem 1rem;
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: var(--radius-sm);
            color: #ef4444;
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
        }

        .upload-area {
            width: 100%;
            padding: 2rem 1.5rem;
            background: #f8fafc;
            border: 2px dashed var(--border-dark);
            border-radius: var(--radius-sm);
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            color: var(--text-secondary);
            font-size: 0.9rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        .upload-area:hover {
            border-color: var(--primary);
            background: #eff6ff;
        }

        input[type="file"] {
            display: none;
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M3 9L12 2L21 9V20C21 20.5304 20.7893 21.0391 20.4142 21.4142C20.0391 21.7893 19.5304 22 19 22H5C4.46957 22 3.96086 21.7893 3.58579 21.4142C3.21071 21.0391 3 20.5304 3 20V9Z"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    <path d="M9 22V12H15V22" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
                ChennaiRooms
            </a>
            <div class="nav-links" id="nav-links"></div>
        </div>
    </nav>

    <div class="page-wrap container">
        <div class="form-card">
            <div class="page-header" style="margin-bottom:2rem;">
                <div>
                    <h1 class="page-title">Post a Room</h1>
                    <p class="page-subtitle">Fill in the details to find your next roommate.</p>
                </div>
            </div>

            <div id="error-msg" class="error-box"></div>

            <form id="post-room-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label">Area / Location</label>
                        <input type="text" id="location" required class="form-control"
                            placeholder="T Nagar, OMR, Velachery">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Monthly Rent (₹)</label>
                        <input type="number" id="rent" required class="form-control" placeholder="10000">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Roommates Needed</label>
                        <input type="number" id="roommates_needed" required class="form-control" placeholder="1">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Room Type</label>
                        <select id="room_type" class="form-control">
                            <option value="1BHK">1BHK</option>
                            <option value="2BHK">2BHK</option>
                            <option value="3BHK">3BHK</option>
                            <option value="PG">PG</option>
                            <option value="Individual House">Individual House</option>
                        </select>
                    </div>
                    <div class="form-group full-col">
                        <label class="form-label">Amenities (comma separated)</label>
                        <input type="text" id="amenities" class="form-control" placeholder="WiFi, AC, Parking, Gym">
                    </div>
                    <div class="form-group full-col">
                        <label class="form-label">Description</label>
                        <textarea id="description" rows="4" class="form-control"
                            placeholder="Tell us more about the room and your expectations..."></textarea>
                    </div>
                    <div class="form-group full-col">
                        <label class="form-label">Room Photo</label>
                        <label for="image" class="upload-area" id="upload-label">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                                style="color: var(--primary);">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                                <polyline points="21 15 16 10 5 21"></polyline>
                            </svg>
                            <span id="upload-text"
                                style="font-weight: 500; color: var(--text-primary); margin-top: 0.5rem;">Click to
                                upload room photo</span>
                            <span style="font-size:0.8rem;">JPG, PNG, WEBP accepted</span>
                        </label>
                        <input type="file" id="image" accept="image/*" onchange="updateLabel(this)">
                    </div>
                    <div class="full-col" style="margin-top:1rem;">
                        <button type="submit" class="btn-primary" style="width:100%; padding: 0.85rem;">Publish Room
                            Post</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/rooms.js"></script>
    <script src="js/messages.js"></script>
    <script src="js/dashboard.js"></script>
    <script>
        function updateLabel(input) {
            const label = document.getElementById('upload-text');
            if (input.files && input.files[0]) {
                label.textContent = input.files[0].name;
            }
        }
        document.getElementById('post-room-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.textContent = 'Publishing...';

            const formData = new FormData();
            formData.append('location', document.getElementById('location').value);
            formData.append('rent', document.getElementById('rent').value);
            formData.append('roommates_needed', document.getElementById('roommates_needed').value);
            formData.append('room_type', document.getElementById('room_type').value);
            formData.append('amenities', document.getElementById('amenities').value);
            formData.append('description', document.getElementById('description').value);
            const imageFile = document.getElementById('image').files[0];
            if (imageFile) formData.append('image', imageFile);

            const errorMsg = document.getElementById('error-msg');
            try {
                await rooms.post(formData);
                window.location.href = 'rooms.html';
            } catch (err) {
                errorMsg.textContent = err.message;
                errorMsg.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Publish Room Post';
            }
        });
    </script>
</body>

</html>
