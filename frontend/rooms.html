<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Rooms | ChennaiRooms</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M3 9L12 2L21 9V20C21 20.5304 20.7893 21.0391 20.4142 21.4142C20.0391 21.7893 19.5304 22 19 22H5C4.46957 22 3.96086 21.7893 3.58579 21.4142C3.21071 21.0391 3 20.5304 3 20V9Z"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    <path d="M9 22V12H15V22" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
                ChennaiRooms
            </a>
            <div class="nav-links" id="nav-links">
                <!-- Navigation links will be injected by auth.js or we can put the static links here -->
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container">
        <!-- Header & Search -->
        <header class="page-header">
            <div>
                <h1 class="page-title">Available Rooms</h1>
                <p class="page-subtitle">Find your next home and roommate in Chennai.</p>
            </div>
            <div class="search-bar">
                <input type="text" id="filter-location" class="search-input"
                    placeholder="Location (e.g. OMR, Anna Nagar)">
                <input type="number" id="filter-rent" class="search-input" placeholder="Max Rent (₹)"
                    style="max-width: 150px;">
                <button onclick="loadRooms()" class="btn-primary">Search</button>
            </div>
        </header>

        <!-- Room Grid -->
        <div id="rooms-grid" class="rooms-grid">
            <div class="empty-state">
                <div class="empty-icon">🏠</div>
                <h3 style="font-size: 1.25rem; font-weight: 600; color: var(--text-primary); margin-bottom: 0.5rem;">
                    Loading rooms...</h3>
            </div>
        </div>
    </main>

    <!-- Message Modal -->
    <div id="message-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <div>
                    <h2 class="modal-title">Message Owner</h2>
                    <div id="modal-room-name" class="modal-subtitle"></div>
                </div>
                <button class="modal-close" onclick="closeMessageModal()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="form-group">
                <label class="form-label">Your Message</label>
                <textarea id="initial-msg" rows="4" class="form-control"
                    placeholder="Hi, I'm interested in this room! Is it still available?"></textarea>
            </div>
            <div class="modal-footer">
                <button onclick="closeMessageModal()" class="btn-secondary">Cancel</button>
                <button onclick="sendInitialMessage()" class="btn-primary">Send Message</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/auth.js"></script>
    <script src="js/rooms.js"></script>
    <script src="js/messages.js"></script>
    <script src="js/dashboard.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => loadRooms());

        async function loadRooms() {
            const grid = document.getElementById('rooms-grid');
            const loc = document.getElementById('filter-location').value;
            const rent = document.getElementById('filter-rent').value;

            let params = new URLSearchParams();
            if (loc) params.append('location', loc);
            if (rent) params.append('maxRent', rent);

            try {
                const user = JSON.parse(localStorage.getItem('user'));
                const allRooms = await rooms.getAll(params.toString());

                if (allRooms.length === 0) {
                    grid.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">🔍</div>
                            <h3 style="font-size: 1.25rem; font-weight: 600; color: var(--text-primary); margin-bottom: 0.5rem;">No rooms found</h3>
                            <p>We couldn't find any rooms matching your criteria. Try adjusting your search.</p>
                        </div>`;
                    return;
                }

                grid.innerHTML = allRooms.map(room => `
                    <div class="room-card">
                        <div class="room-image-container">
                            <img src="${room.image_url || 'https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=800&q=80'}"
                                class="room-image" alt="Room" onerror="this.src='https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=800&q=80'">
                            <div class="rent-badge">₹${room.rent}/mo</div>
                        </div>
                        <div class="room-details">
                            <h3 class="room-location">${room.location}</h3>
                            <div class="room-type">${room.room_type} · ${room.roommates_needed} roommate(s) needed</div>
                            
                            <p class="room-description">${room.description || 'No description provided.'}</p>
                            
                            <div class="amenities-list">
                                ${(room.amenities || '').split(',').map(a => `<span class="amenity-tag">${a.trim()}</span>`).join('')}
                            </div>
                            
                            <div class="room-actions">
                                <button class="btn-primary" onclick="openMessageModal(${room.room_id}, ${room.user_id}, '${room.location.replace(/'/g, "\\'")}')">
                                    Message Owner
                                </button>
                                ${user && user.id === room.user_id ? `
                                <button onclick="deleteRoom(${room.room_id})" class="btn-danger" title="Delete Room">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                                </button>
                                ` : ''}
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                grid.innerHTML = `
                    <div class="empty-state" style="border-color: #fca5a5; background: #fef2f2;">
                        <div class="empty-icon">⚠️</div>
                        <h3 style="font-size: 1.25rem; font-weight: 600; color: #ef4444; margin-bottom: 0.5rem;">Error loading rooms</h3>
                        <p style="color: #ef4444;">${err.message}</p>
                    </div>`;
            }
        }

        // ── Message Modal ──
        let currentRoomId = null, currentOwnerId = null;

        function openMessageModal(roomId, ownerId, location) {
            const user = JSON.parse(localStorage.getItem('user'));
            if (!user) { alert('Please login to message owners.'); window.location.href = 'login.html'; return; }
            if (user.id === ownerId) { alert("You can't message yourself!"); return; }

            currentRoomId = roomId;
            currentOwnerId = ownerId;
            document.getElementById('modal-room-name').textContent = `📍 ${location}`;
            document.getElementById('message-modal').classList.add('open');
            document.getElementById('initial-msg').focus();
        }

        function closeMessageModal() {
            document.getElementById('message-modal').classList.remove('open');
            document.getElementById('initial-msg').value = '';
        }

        async function sendInitialMessage() {
            const text = document.getElementById('initial-msg').value.trim();
            if (!text) { alert('Please type a message first.'); return; }

            const btn = document.querySelector('#message-modal .btn-primary');
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = 'Sending...';

            try {
                const user = JSON.parse(localStorage.getItem('user'));
                const token = localStorage.getItem('token');

                if (!user || !token) {
                    alert('Your session has expired. Please log in again.');
                    window.location.href = 'login.html';
                    return;
                }

                const result = await apiRequest('/conversations/start', {
                    method: 'POST',
                    body: JSON.stringify({ receiver_id: currentOwnerId, room_id: currentRoomId })
                });

                const conversationId = result.conversationId;
                await messages.sendMessage(conversationId, text);
                window.location.href = `messages.html?conv=${conversationId}`;
            } catch (err) {
                if (err.message && err.message.toLowerCase().includes('failed to fetch')) {
                    alert('Cannot reach the server. Make sure the backend is running.');
                } else {
                    alert('Error sending message: ' + err.message);
                }
                btn.disabled = false;
                btn.textContent = originalText;
            }
        }
    </script>
</body>

</html>
