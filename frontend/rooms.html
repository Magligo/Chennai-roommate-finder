<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Rooms | Chennai Roommate Finder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="bg-gray-50 text-gray-900 min-h-screen">
    <nav class="fixed w-full z-50 bg-white border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <a href="index.html"
                    class="text-2xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">ChennaiRooms</a>
                <div class="flex space-x-6 items-center" id="nav-links"></div>
            </div>
        </div>
    </nav>

    <main class="pt-24 pb-12 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex flex-col md:flex-row justify-between items-end gap-6 mb-10">
            <div>
                <h1 class="text-3xl font-bold text-gray-900">Available Rooms</h1>
                <p class="text-gray-500 mt-2">Find your next home and roommate in Chennai.</p>
            </div>

            <div class="w-full md:w-auto flex flex-col sm:flex-row gap-4">
                <input type="text" id="filter-location" placeholder="Location (e.g. OMR)"
                    class="px-4 py-2 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none">
                <input type="number" id="filter-rent" placeholder="Max Rent"
                    class="px-4 py-2 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none w-32">
                <button onclick="loadRooms()"
                    class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold hover:bg-blue-700 transition">Search</button>
            </div>
        </div>

        <div id="rooms-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="col-span-full text-center py-20 text-gray-500">Loading rooms...</div>
        </div>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/rooms.js"></script>
    <script src="js/messages.js"></script>
    <script src="js/dashboard.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => loadRooms());

        async function loadRooms() {
            const grid = document.getElementById('rooms-grid');
            const loc = document.getElementById('filter-location').value;
            const rent = document.getElementById('filter-rent').value;

            let params = new URLSearchParams();
            if (loc) params.append('location', loc);
            if (rent) params.append('maxRent', rent);

            try {
                const user = JSON.parse(localStorage.getItem('user'));
                const allRooms = await rooms.getAll(params.toString());
                if (allRooms.length === 0) {
                    grid.innerHTML = '<div class="col-span-full text-center py-20 text-gray-400 font-medium">No rooms found matching your criteria.</div>';
                    return;
                }

                grid.innerHTML = allRooms.map(room => `
                    <div class="bg-white rounded-3xl overflow-hidden border border-gray-100 shadow-sm hover:shadow-xl transition-all duration-300 group">
                        <div class="h-48 bg-gray-200 relative overflow-hidden">
                            <img src="${room.image_url || 'https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=800&q=80'}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500" alt="Room" onerror="this.src='https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=800&q=80'">
                            <div class="absolute top-4 right-4 bg-white/90 backdrop-blur px-3 py-1 rounded-full text-blue-600 font-bold text-sm">₹${room.rent}/mo</div>
                        </div>
                        <div class="p-6">
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <h3 class="text-xl font-bold text-gray-900">${room.location}</h3>
                                    <p class="text-sm text-gray-500">${room.room_type} • ${room.roommates_needed} roommate(s) needed</p>
                                </div>
                            </div>
                            <p class="text-gray-600 text-sm line-clamp-2 mb-6">${room.description || 'No description provided.'}</p>
                            <div class="flex flex-wrap gap-2 mb-8">
                                ${(room.amenities || '').split(',').map(a => `<span class="px-2 py-1 bg-gray-50 text-gray-500 text-xs rounded-md font-medium border border-gray-100">${a.trim()}</span>`).join('')}
                            </div>
                            <div class="flex gap-2">
                                <button onclick="openMessageModal(${room.room_id}, ${room.user_id}, '${room.location.replace(/'/g, "\\'")}')" 
                                    class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition flex items-center justify-center gap-2">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
                                    </svg>
                                    Message Owner
                                </button>
                                ${user && user.id === room.user_id ? `
                                    <button onclick="deleteRoom(${room.room_id})" class="px-4 bg-red-50 text-red-600 py-3 rounded-xl font-bold hover:bg-red-100 transition border border-red-100">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                        </svg>
                                    </button>
                                ` : ''}
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                grid.innerHTML = `<div class="col-span-full text-center py-20 text-red-500">${err.message}</div>`;
            }
        }

        // ── Message Modal Logic ──
        let currentRoomId = null;
        let currentOwnerId = null;

        function openMessageModal(roomId, ownerId, location) {
            const user = JSON.parse(localStorage.getItem('user'));
            if (!user) {
                alert('Please login to message owners.');
                window.location.href = 'login.html';
                return;
            }
            if (user.id === ownerId) {
                alert("You can't message yourself!");
                return;
            }

            currentRoomId = roomId;
            currentOwnerId = ownerId;

            document.getElementById('modal-room-name').textContent = location;
            document.getElementById('message-modal').classList.remove('hidden');
            document.getElementById('message-modal').classList.add('flex');
            document.getElementById('initial-msg').focus();
        }

        function closeMessageModal() {
            document.getElementById('message-modal').classList.add('hidden');
            document.getElementById('message-modal').classList.remove('flex');
            document.getElementById('initial-msg').value = '';
        }

        async function sendInitialMessage() {
            const text = document.getElementById('initial-msg').value.trim();
            if (!text) {
                alert('Please type a message first.');
                return;
            }

            const btn = document.querySelector('#message-modal button.bg-blue-600');
            btn.disabled = true;
            btn.textContent = 'Sending...';

            try {
                // Check user is still logged in
                const user = JSON.parse(localStorage.getItem('user'));
                const token = localStorage.getItem('token');
                if (!user || !token) {
                    alert('Your session has expired. Please log in again.');
                    window.location.href = 'login.html';
                    return;
                }

                console.log('Starting conversation with owner:', currentOwnerId, 'for room:', currentRoomId);

                // 1. Start/Get conversation
                const result = await apiRequest('/conversations/start', {
                    method: 'POST',
                    body: JSON.stringify({ receiver_id: currentOwnerId, room_id: currentRoomId })
                });

                console.log('Conversation started:', result);
                const conversationId = result.conversationId;

                // 2. Send the message
                await messages.sendMessage(conversationId, text);
                console.log('Message sent to conversation:', conversationId);

                // 3. Success – redirect to messages
                window.location.href = `messages.html?conv=${conversationId}`;
            } catch (err) {
                console.error('Send message error:', err);
                if (err.message && err.message.includes('401')) {
                    alert('You are not logged in. Please log in and try again.');
                    window.location.href = 'login.html';
                } else if (err.message && err.message.toLowerCase().includes('failed to fetch')) {
                    alert('Cannot reach the server. Make sure the backend is running on port 5000.');
                } else {
                    alert('Error sending message: ' + err.message);
                }
                btn.disabled = false;
                btn.textContent = 'Send Message';
            }
        }
    </script>

    <!-- Message Modal HTML -->
    <div id="message-modal"
        class="fixed inset-0 z-[100] hidden items-center justify-center p-4 bg-gray-900/50 backdrop-blur-sm">
        <div
            class="bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-200">
            <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                <div>
                    <h3 class="font-bold text-gray-900">Message Owner</h3>
                    <p class="text-xs text-blue-600 font-medium" id="modal-room-name"></p>
                </div>
                <button onclick="closeMessageModal()" class="text-gray-400 hover:text-gray-600 transition">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div class="p-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">Your Message</label>
                <textarea id="initial-msg" rows="4"
                    placeholder="Hi, I'm interested in this room! Is it still available?"
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none transition resize-none text-sm"></textarea>
                <div class="flex gap-3 mt-6">
                    <button onclick="closeMessageModal()"
                        class="flex-1 px-4 py-3 border border-gray-200 rounded-xl font-bold text-gray-600 hover:bg-gray-50 transition">Cancel</button>
                    <button onclick="sendInitialMessage()"
                        class="flex-1 px-4 py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-200">Send
                        Message</button>
                </div>
            </div>
        </div>
    </div>

</html>
