<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Rooms | ChennaiRooms</title>
    <link rel="stylesheet" href="css/glow.css">
    <style>
        .page-wrap {
            padding: 90px 0 60px;
        }

        .page-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        /* Filter Bar */
        .filter-bar {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-bar input {
            padding: 0.6rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            color: var(--text);
            font-size: 0.875rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .filter-bar input::placeholder {
            color: var(--text-muted);
        }

        .filter-bar input:focus {
            border-color: var(--purple-l);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.18);
        }

        /* Rooms Grid */
        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
            gap: 1.5rem;
        }

        /* Room Card */
        .room-card {
            background: rgba(15, 15, 35, 0.85);
            border: 1px solid var(--border);
            border-radius: 1.25rem;
            overflow: hidden;
            backdrop-filter: blur(14px);
            transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
        }

        .room-card:hover {
            transform: translateY(-6px);
            border-color: rgba(124, 58, 237, 0.55);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 0 0 40px rgba(124, 58, 237, 0.15);
        }

        .room-img {
            position: relative;
            height: 196px;
            overflow: hidden;
        }

        .room-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .room-card:hover .room-img img {
            transform: scale(1.08);
        }

        .rent-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: linear-gradient(135deg, var(--purple), var(--cyan));
            color: #fff;
            font-weight: 700;
            font-size: 0.8rem;
            padding: 0.35rem 0.85rem;
            border-radius: 50px;
            box-shadow: 0 0 16px rgba(124, 58, 237, 0.5);
        }

        .room-body {
            padding: 1.25rem 1.4rem 1.4rem;
        }

        .room-location {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--white);
        }

        .room-type {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.2rem;
        }

        .room-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin: 0.75rem 0;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .amenity-wrap {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-bottom: 1.1rem;
        }

        .amenity-tag {
            background: rgba(124, 58, 237, 0.1);
            color: var(--purple-l);
            border: 1px solid rgba(124, 58, 237, 0.25);
            padding: 0.2rem 0.6rem;
            border-radius: 6px;
            font-size: 0.73rem;
            font-weight: 500;
        }

        .card-actions {
            display: flex;
            gap: 0.6rem;
        }

        .msg-btn {
            flex: 1;
            padding: 0.65rem 1rem;
            background: linear-gradient(135deg, var(--purple), #6d28d9);
            color: #fff;
            font-weight: 700;
            font-size: 0.875rem;
            border-radius: 0.75rem;
            border: none;
            cursor: pointer;
            box-shadow: 0 0 18px rgba(124, 58, 237, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
        }

        .msg-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 28px rgba(124, 58, 237, 0.7);
        }

        /* Message Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 200;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal-box {
            background: rgba(15, 15, 38, 0.98);
            border: 1px solid rgba(124, 58, 237, 0.4);
            border-radius: 1.5rem;
            padding: 2rem;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 0 80px rgba(124, 58, 237, 0.25);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-title {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--white);
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.4rem;
            line-height: 1;
            transition: color 0.2s;
        }

        .modal-close:hover {
            color: var(--pink-l);
        }

        .modal-textarea {
            width: 100%;
            padding: 0.85rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 0.875rem;
            color: var(--text);
            font-size: 0.9rem;
            resize: none;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            font-family: inherit;
        }

        .modal-textarea::placeholder {
            color: var(--text-muted);
        }

        .modal-textarea:focus {
            border-color: var(--purple-l);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.2);
        }

        .modal-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.25rem;
        }
    </style>
</head>

<body>
    <nav class="glow-nav">
        <div class="glow-nav-inner">
            <a href="index.html" class="glow-logo">⚡ ChennaiRooms</a>
            <div class="nav-links" id="nav-links"></div>
        </div>
    </nav>

    <div class="page-wrap">
        <div class="content-wrap">
            <div class="page-header">
                <div>
                    <h1 class="glow-title" style="font-size:2rem;">Available Rooms</h1>
                    <p class="glow-subtitle" style="font-size:0.95rem;">Find your next home and roommate in Chennai.</p>
                </div>
                <div class="filter-bar">
                    <input type="text" id="filter-location" placeholder="📍 Location (e.g. OMR)">
                    <input type="number" id="filter-rent" placeholder="₹ Max Rent" style="width:120px;">
                    <button onclick="loadRooms()" class="btn-glow-cyan" style="padding:0.6rem 1.25rem;">Search</button>
                </div>
            </div>

            <div id="rooms-grid" class="rooms-grid">
                <div style="grid-column:1/-1;text-align:center;padding:5rem 0;color:var(--text-muted);">
                    <div style="font-size:2rem;margin-bottom:1rem;animation:glow-pulse 1.5s infinite;">✨</div>
                    Loading rooms...
                </div>
            </div>
        </div>
    </div>

    <!-- Message Modal -->
    <div id="message-modal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header">
                <div>
                    <div class="modal-title">💬 Message Owner</div>
                    <div id="modal-room-name" style="font-size:0.82rem;color:var(--cyan-l);margin-top:0.2rem;"></div>
                </div>
                <button class="modal-close" onclick="closeMessageModal()">×</button>
            </div>
            <label class="glow-label">Your Message</label>
            <textarea id="initial-msg" rows="4" class="modal-textarea"
                placeholder="Hi, I'm interested in this room! Is it still available?"></textarea>
            <div class="modal-actions">
                <button onclick="closeMessageModal()" class="btn-outline" style="flex:1;">Cancel</button>
                <button onclick="sendInitialMessage()" class="btn-glow-purple" style="flex:1;">Send Message ✈️</button>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/rooms.js"></script>
    <script src="js/messages.js"></script>
    <script src="js/dashboard.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => loadRooms());

        async function loadRooms() {
            const grid = document.getElementById('rooms-grid');
            const loc = document.getElementById('filter-location').value;
            const rent = document.getElementById('filter-rent').value;
            let params = new URLSearchParams();
            if (loc) params.append('location', loc);
            if (rent) params.append('maxRent', rent);
            try {
                const user = JSON.parse(localStorage.getItem('user'));
                const allRooms = await rooms.getAll(params.toString());
                if (allRooms.length === 0) {
                    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:5rem 0;color:var(--text-muted);">No rooms found matching your criteria.</div>';
                    return;
                }
                grid.innerHTML = allRooms.map(room => `
                    <div class="room-card fade-in-up">
                        <div class="room-img">
                            <img src="${room.image_url || 'https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=800&q=80'}"
                                alt="Room" onerror="this.src='https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=800&q=80'">
                            <div class="rent-badge">₹${room.rent}/mo</div>
                        </div>
                        <div class="room-body">
                            <div class="room-location">📍 ${room.location}</div>
                            <div class="room-type">${room.room_type} · ${room.roommates_needed} roommate(s) needed</div>
                            <p class="room-desc">${room.description || 'No description provided.'}</p>
                            <div class="amenity-wrap">
                                ${(room.amenities || '').split(',').map(a => `<span class="amenity-tag">${a.trim()}</span>`).join('')}
                            </div>
                            <div class="card-actions">
                                <button class="msg-btn" onclick="openMessageModal(${room.room_id}, ${room.user_id}, '${room.location.replace(/'/g, "\\'")}')">
                                    💬 Message Owner
                                </button>
                                ${user && user.id === room.user_id ? `
                                <button onclick="deleteRoom(${room.room_id})" class="btn-danger" style="padding:0.65rem 1rem;">🗑️</button>
                                ` : ''}
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:5rem 0;color:#f87171;">⚠️ ${err.message}</div>`;
            }
        }

        // ── Message Modal ──
        let currentRoomId = null, currentOwnerId = null;

        function openMessageModal(roomId, ownerId, location) {
            const user = JSON.parse(localStorage.getItem('user'));
            if (!user) { alert('Please login to message owners.'); window.location.href = 'login.html'; return; }
            if (user.id === ownerId) { alert("You can't message yourself!"); return; }
            currentRoomId = roomId; currentOwnerId = ownerId;
            document.getElementById('modal-room-name').textContent = location;
            document.getElementById('message-modal').classList.add('open');
            document.getElementById('initial-msg').focus();
        }
        function closeMessageModal() {
            document.getElementById('message-modal').classList.remove('open');
            document.getElementById('initial-msg').value = '';
        }
        async function sendInitialMessage() {
            const text = document.getElementById('initial-msg').value.trim();
            if (!text) { alert('Please type a message first.'); return; }
            const btn = document.querySelector('#message-modal .btn-glow-purple');
            btn.disabled = true; btn.textContent = 'Sending...';
            try {
                const user = JSON.parse(localStorage.getItem('user'));
                const token = localStorage.getItem('token');
                if (!user || !token) { alert('Your session has expired. Please log in again.'); window.location.href = 'login.html'; return; }
                const result = await apiRequest('/conversations/start', {
                    method: 'POST',
                    body: JSON.stringify({ receiver_id: currentOwnerId, room_id: currentRoomId })
                });
                const conversationId = result.conversationId;
                await messages.sendMessage(conversationId, text);
                window.location.href = `messages.html?conv=${conversationId}`;
            } catch (err) {
                if (err.message && err.message.toLowerCase().includes('failed to fetch')) {
                    alert('Cannot reach the server. Make sure the backend is running on port 5000.');
                } else { alert('Error sending message: ' + err.message); }
                btn.disabled = false; btn.textContent = 'Send Message ✈️';
            }
        }
    </script>
</body>

</html>
