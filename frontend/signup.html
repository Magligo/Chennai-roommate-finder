<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | ChennaiRooms</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem 1.5rem;
            background-color: var(--bg-color);
        }

        .auth-card {
            width: 100%;
            max-width: 520px;
            background: var(--paper);
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            padding: 2.5rem;
            box-shadow: var(--shadow-lg);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header .logo {
            justify-content: center;
            margin-bottom: 1rem;
        }

        .auth-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-top: 0.75rem;
            letter-spacing: -0.5px;
        }

        .auth-sub {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-top: 0.3rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .full-col {
            grid-column: 1 / -1;
        }

        .form-group {
            margin-bottom: 0.5rem;
        }

        .error-box {
            display: none;
            padding: 0.85rem 1rem;
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: var(--radius-sm);
            color: #ef4444;
            font-size: 0.875rem;
            margin-bottom: 1rem;
        }

        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .auth-footer a {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
            transition: color 0.2s;
        }

        .auth-footer a:hover {
            color: var(--primary-hover);
        }
    </style>
</head>

<body>
    <div class="auth-card">
        <div class="auth-header">
            <a href="index.html" class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M3 9L12 2L21 9V20C21 20.5304 20.7893 21.0391 20.4142 21.4142C20.0391 21.7893 19.5304 22 19 22H5C4.46957 22 3.96086 21.7893 3.58579 21.4142C3.21071 21.0391 3 20.5304 3 20V9Z"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    <path d="M9 22V12H15V22" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
                ChennaiRooms
            </a>
            <h1 class="auth-title">Join Us Today</h1>
            <p class="auth-sub">Create your profile to start searching</p>
        </div>

        <div id="error-msg" class="error-box"></div>

        <form id="signup-form">
            <div class="form-grid">
                <div class="form-group full-col">
                    <label class="form-label">Full Name</label>
                    <input type="text" id="name" required class="form-control" placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" id="email" required class="form-control" placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label class="form-label">Phone</label>
                    <input type="text" id="phone" class="form-control" placeholder="+91 98765 43210">
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" required class="form-control" placeholder="••••••••">
                </div>
                <div class="form-group">
                    <label class="form-label">Age</label>
                    <input type="number" id="age" class="form-control" placeholder="25">
                </div>
                <div class="form-group">
                    <label class="form-label">Occupation</label>
                    <input type="text" id="occupation" class="form-control" placeholder="Software Engineer">
                </div>
                <div class="form-group full-col">
                    <label class="form-label">Preferred Location</label>
                    <input type="text" id="location" class="form-control" placeholder="T Nagar / Adyar / OMR">
                </div>
                <div class="full-col" style="margin-top:0.5rem;">
                    <button type="submit" class="btn-primary" style="width:100%;">Create Account</button>
                </div>
            </div>
        </form>

        <p class="auth-footer">
            Already have an account? <a href="login.html">Sign In</a>
        </p>
    </div>

    <script src="js/auth.js"></script>
    <script>
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                phone: document.getElementById('phone').value,
                age: document.getElementById('age').value,
                occupation: document.getElementById('occupation').value,
                preferred_location: document.getElementById('location').value
            };
            const errorMsg = document.getElementById('error-msg');
            try {
                const response = await auth.signup(data);
                localStorage.setItem('token', response.token);
                localStorage.setItem('user', JSON.stringify(response.user));
                window.location.href = 'dashboard.html';
            } catch (err) {
                errorMsg.textContent = err.message;
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>

</html>
