<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | ChennaiRooms</title>
    <link rel="stylesheet" href="css/glow.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem 1.5rem;
        }

        .auth-card {
            width: 100%;
            max-width: 520px;
            background: rgba(15, 15, 35, 0.9);
            border: 1px solid var(--border);
            border-radius: 1.75rem;
            padding: 2.5rem;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6), 0 0 80px rgba(124, 58, 237, 0.1);
            backdrop-filter: blur(20px);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-title {
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--white);
            margin-top: 0.75rem;
        }

        .auth-sub {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 0.3rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .full-col {
            grid-column: 1 / -1;
        }

        .form-group {
            margin-bottom: 0.25rem;
        }

        .error-box {
            display: none;
            padding: 0.85rem 1rem;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 0.875rem;
            color: #f87171;
            font-size: 0.875rem;
            margin-bottom: 1rem;
        }

        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--purple-l);
            font-weight: 600;
            text-decoration: none;
        }

        .auth-footer a:hover {
            text-shadow: 0 0 10px rgba(124, 58, 237, 0.6);
        }
    </style>
</head>

<body>
    <div class="auth-card fade-in-up">
        <div class="auth-header">
            <a href="index.html" class="glow-logo">⚡ ChennaiRooms</a>
            <h1 class="auth-title">Join Us Today</h1>
            <p class="auth-sub">Create your profile to start searching</p>
        </div>

        <div id="error-msg" class="error-box"></div>

        <form id="signup-form">
            <div class="form-grid">
                <div class="form-group full-col">
                    <label class="glow-label">Full Name</label>
                    <input type="text" id="name" required class="glow-input" placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label class="glow-label">Email</label>
                    <input type="email" id="email" required class="glow-input" placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label class="glow-label">Phone</label>
                    <input type="text" id="phone" class="glow-input" placeholder="+91 98765 43210">
                </div>
                <div class="form-group">
                    <label class="glow-label">Password</label>
                    <input type="password" id="password" required class="glow-input" placeholder="••••••••">
                </div>
                <div class="form-group">
                    <label class="glow-label">Age</label>
                    <input type="number" id="age" class="glow-input" placeholder="25">
                </div>
                <div class="form-group">
                    <label class="glow-label">Occupation</label>
                    <input type="text" id="occupation" class="glow-input" placeholder="Software Engineer">
                </div>
                <div class="form-group full-col">
                    <label class="glow-label">Preferred Location</label>
                    <input type="text" id="location" class="glow-input" placeholder="T Nagar / Adyar / OMR">
                </div>
                <div class="full-col" style="margin-top:0.5rem;">
                    <button type="submit" class="btn-glow-purple" style="width:100%;">Create Account 🚀</button>
                </div>
            </div>
        </form>

        <p class="auth-footer">
            Already have an account? <a href="login.html">Sign In →</a>
        </p>
    </div>

    <script src="js/auth.js"></script>
    <script>
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                phone: document.getElementById('phone').value,
                age: document.getElementById('age').value,
                occupation: document.getElementById('occupation').value,
                preferred_location: document.getElementById('location').value
            };
            const errorMsg = document.getElementById('error-msg');
            try {
                const response = await auth.signup(data);
                localStorage.setItem('token', response.token);
                localStorage.setItem('user', JSON.stringify(response.user));
                window.location.href = 'dashboard.html';
            } catch (err) {
                errorMsg.textContent = err.message;
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>

</html>
